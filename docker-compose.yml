version: "3.9"
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gridiant}
      POSTGRES_USER: ${POSTGRES_USER:-gridiant}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gridiant}
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]

  redis:
    image: redis:7
    ports: ["6379:6379"]

  backend:
    build:
      context: .
      dockerfile: infrastructure/docker/backend.Dockerfile
    env_file: ["backend/.env.example"]
    depends_on: [postgres, redis]
    ports: ["8000:8000"]

  worker:
    build:
      context: .
      dockerfile: infrastructure/docker/backend.Dockerfile
    command: celery -A app.tasks.celery_app worker -l INFO
    working_dir: /workspace/backend
    env_file: ["backend/.env.example"]
    depends_on: [backend, redis]

  frontend:
    build:
      context: .
      dockerfile: infrastructure/docker/frontend.Dockerfile
    env_file: ["frontend/.env.example"]
    depends_on: [backend]
    ports: ["3000:3000"]
  caddy:
  image: caddy:2
  ports:
    - "80:80"
    - "443:443"
  volumes:
    - ./infrastructure/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
    - caddy_data:/data
    - caddy_config:/config
  depends_on:
    - frontend
    - backend
volumes:
  pgdata:
  caddy_data:
  caddy_config: